<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | 妊活スケジューラー</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Yu Gothic', sans-serif;
      background: linear-gradient(160deg, #fff1f6 0%, #fce7f3 35%, #f0ebfe 100%);
      color: #1f2937;
      line-height: 1.8;
      padding: 24px 16px 64px;
    }
    .page { max-width: 760px; margin: 0 auto; }
    .card {
      background: rgba(255, 255, 255, 0.96);
      border-radius: 20px;
      box-shadow: 0 10px 32px rgba(190, 24, 93, 0.08), 0 2px 8px rgba(0, 0, 0, 0.04);
      padding: 24px 20px;
    }
    .crumbs {
      margin-bottom: 14px;
      font-size: 12px;
      color: #6b7280;
    }
    .crumbs a { color: #be185d; text-decoration: none; }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.25;
      color: #be185d;
    }
    .lead {
      margin: 0 0 20px;
      color: #6b7280;
      font-size: 14px;
    }
    .info {
      margin-top: 18px;
      padding: 16px;
      border-radius: 14px;
      background: #fff8fb;
      border: 1px solid #fbcfe8;
    }
    .mail {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 12px;
      background: #be185d;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      margin-top: 14px;
    }
    p, li { font-size: 14px; }
    ul { padding-left: 1.2em; }
    a { color: #be185d; }
    .footer-links {
      margin-top: 26px;
      font-size: 13px;
      color: #6b7280;
    }
    .footer-links a { margin-right: 14px; }
  </style>
</head>
<body>
  <div class="page">
    <div class="crumbs"><a href="../index.html">ホーム</a> / お問い合わせ</div>
    <div class="card">
      <h1>お問い合わせ</h1>
      <p class="lead">当サイトに関するご質問、ご意見、掲載内容の修正依頼などは、以下のメールアドレスまでご連絡ください。</p>

      <div class="info">
        <p><strong>連絡先メールアドレス</strong></p>
        <p><a href=""></a></p>
        <a class="mail" href="">メールを送る</a>
      </div>

      <h2>お問い合わせの前に</h2>
      <ul>
        <li>治療内容や受診判断など医療的な内容は、必ず通院先の医療機関へご確認ください。</li>
        <li>返信までに数日いただく場合があります。</li>
        <li>内容によっては返信できない場合があります。</li>
      </ul>

      <h2>掲載内容について</h2>
      <p>当サイトは一般的な情報提供を目的として運営しています。誤記や表現の修正依頼がある場合は、該当ページURLと修正内容をあわせてお知らせください。</p>

      <div class="footer-links">
        <a href="../index.html">ホーム</a>
        <a href="../privacy-policy/index.html">プライバシーポリシー</a>
      </div>
    </div>
  </div>
</body>
</html>
