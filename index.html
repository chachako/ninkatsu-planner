<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>菴灘､門女邊ｾ繧ｹ繧ｱ繧ｸ繝･繝ｼ繝ｩ繝ｼ | 螯頑ｴｻ繧ｵ繝昴・繝・/title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --pink:        #ec4899;
      --pink-dark:   #be185d;
      --pink-light:  #fce7f3;
      --pink-mid:    #fbcfe8;
      --purple:      #7c3aed;
      --purple-light:#f5f3ff;
      --blue:        #3b82f6;
      --gray:        #6b7280;
      --text:        #1f2937;
      --text-sub:    #6b7280;
      --radius:      18px;
      --shadow:      0 4px 24px rgba(190,24,93,.08), 0 1px 4px rgba(0,0,0,.04);
    }

    body {
      font-family: -apple-system, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Yu Gothic', sans-serif;
      background: linear-gradient(160deg, #fff1f6 0%, #fce7f3 35%, #f0ebfe 100%);
      min-height: 100vh;
      padding: 24px 16px 64px;
      color: var(--text);
      line-height: 1.55;
    }
    .app { max-width: 540px; margin: 0 auto; }

    /* 笏笏 Header 笏笏 */
    .hd { text-align: center; margin-bottom: 22px; }
    .hd-icon { font-size: 38px; margin-bottom: 6px; }
    .hd h1 { font-size: 21px; font-weight: 800; color: var(--pink-dark); }
    .hd p  { font-size: 13px; color: var(--text-sub); margin-top: 4px; }

    /* 笏笏 Card 笏笏 */
    .card {
      background: #fff; border-radius: var(--radius); padding: 20px;
      margin-bottom: 12px; box-shadow: var(--shadow);
    }
    .guide-card {
      background: linear-gradient(135deg, #fff8fb, #f8f5ff);
      border: 1px solid #f3d9e7;
    }
    .guide-eyebrow {
      font-size: 10px; font-weight: 700; letter-spacing: .12em;
      color: var(--text-sub); margin-bottom: 8px;
    }
    .guide-title {
      font-size: 17px; font-weight: 800; line-height: 1.45;
      color: var(--pink-dark); margin-bottom: 8px;
    }
    .guide-body {
      font-size: 13px; color: var(--text-sub); margin-bottom: 14px;
    }
    .guide-link {
      display: inline-flex; align-items: center; justify-content: center;
      width: 100%; min-height: 46px; border-radius: 12px;
      background: #fff; border: 2px solid var(--pink-mid);
      color: var(--pink-dark); font-size: 14px; font-weight: 800;
      text-decoration: none; transition: background .18s, border-color .18s, transform .18s;
    }
    .guide-link:hover {
      background: var(--pink-light); border-color: var(--pink);
      transform: translateY(-1px); text-decoration: none;
    }

    /* 笏笏 Form 笏笏 */
    .fg { margin-bottom: 16px; }
    .fg:last-of-type { margin-bottom: 0; }
    .fg-label {
      font-size: 13px; font-weight: 700; color: var(--pink-dark);
      margin-bottom: 7px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .fg-opt { font-size: 11px; font-weight: 400; color: var(--text-sub); }
    .fg-hint { font-size: 11px; color: var(--text-sub); margin-top: 5px; }

    input[type="date"] {
      width: 100%; padding: 13px 15px;
      border: 2px solid var(--pink-mid); border-radius: 12px;
      font-size: 17px; color: var(--text); background: #fdf9fb;
      outline: none; transition: border-color .2s, box-shadow .2s; cursor: pointer;
    }
    input[type="date"]:focus { border-color: var(--pink); box-shadow: 0 0 0 4px rgba(236,72,153,.1); }
    input[type="date"].filled { border-color: var(--pink); }
    select.input-select {
      width: 100%;
      padding: 13px 15px;
      border: 2px solid var(--pink-mid);
      border-radius: 12px;
      font-size: 15px;
      color: var(--text);
      background: #fdf9fb;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      cursor: pointer;
      margin-bottom: 10px;
    }
    select.input-select:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 4px rgba(236,72,153,.1);
    }
    .build-btn {
      width: 100%;
      margin-top: 14px;
      border: 0;
      border-radius: 14px;
      padding: 14px 16px;
      background: linear-gradient(135deg, var(--pink) 0%, #fb7185 100%);
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: .02em;
      cursor: pointer;
      box-shadow: 0 14px 28px rgba(236,72,153,.18);
      transition: transform .18s ease, box-shadow .18s ease, filter .18s ease;
    }
    .build-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 30px rgba(236,72,153,.22);
      filter: saturate(1.03);
    }
    .hidden-inputs { display: none; }
    .divider { height: 1px; background: #f3f4f6; margin: 16px 0; }

    /* 笏笏 Embryo toggle 笏笏 */
    .et-label { font-size: 12px; font-weight: 700; color: var(--text-sub); margin-bottom: 8px; }
    .et-row { display: flex; gap: 8px; }
    .et-btn {
      flex: 1; padding: 10px 8px; text-align: center;
      border: 2px solid #e9d5ff; border-radius: 10px;
      background: #fff; cursor: pointer; transition: all .18s;
    }
    .et-btn .em { display: block; font-size: 13px; font-weight: 700; color: var(--purple); }
    .et-btn .es { display: block; font-size: 10px; color: var(--text-sub); font-weight: 400; margin-top: 2px; }
    .et-btn.active { border-color: var(--purple); background: var(--purple-light); }
    .et-btn.active .em { color: #5b21b6; }

    /* 笏笏 Results 笏笏 */
    #results { animation: fadeUp .4s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: none; }
    }

    /* 笏笏 Status card 笏笏 */
    .sc {
      border-radius: var(--radius); padding: 22px 20px;
      margin-bottom: 12px; box-shadow: var(--shadow);
    }
    .sc-ey   { font-size: 11px; font-weight: 700; letter-spacing: .1em; opacity: .75; margin-bottom: 5px; }
    .sc-ttl  { font-size: 26px; font-weight: 800; line-height: 1.2; margin-bottom: 6px; }
    .sc-body { font-size: 13px; opacity: .85; }

    /* 笏笏 Next event 笏笏 */
    .ne {
      background: #fff; border-radius: var(--radius); padding: 16px 18px;
      margin-bottom: 12px; box-shadow: var(--shadow);
      display: flex; align-items: center; gap: 12px;
    }
    .ne-icon { font-size: 28px; flex-shrink: 0; }
    .ne-lbl  { font-size: 10px; font-weight: 700; letter-spacing: .1em; color: var(--text-sub); }
    .ne-name { font-size: 15px; font-weight: 700; color: var(--text); margin: 3px 0 2px; }
    .ne-date { font-size: 12px; color: var(--pink); font-weight: 600; }
    .ne-days {
      margin-left: auto; flex-shrink: 0; text-align: center;
      background: var(--pink-light); border-radius: 10px; padding: 9px 13px; min-width: 54px;
    }
    .ne-days .nd { font-size: 22px; font-weight: 900; color: var(--pink-dark); line-height: 1; }
    .ne-days .nl { font-size: 10px; font-weight: 700; color: var(--pink-dark); }

    /* 笏笏 Calendar 笏笏 */
    .cal-card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 12px;
      overflow: hidden;
      border: 1px solid #f3e8f0;
    }
    .cal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px 12px;
      border-bottom: 1px solid #f3f4f6;
      background: linear-gradient(180deg, #fff 0%, #fff8fb 100%);
    }
    .cal-title-wrap { min-width: 0; }
    .cal-kicker {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .12em;
      color: var(--text-sub);
      margin-bottom: 4px;
    }
    .cal-title {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      line-height: 1.1;
    }
    .cal-nav { display: flex; align-items: center; gap: 8px; }
    .cal-btn {
      border: 1px solid #e5e7eb;
      background: #fff;
      color: var(--text);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background .18s, border-color .18s, color .18s;
    }
    .cal-btn:hover {
      background: #fdf2f8;
      border-color: var(--pink-mid);
      color: var(--pink-dark);
    }
    .cal-grid-head {
      display: table;
      table-layout: fixed;
      width: 100%;
      background: #fafafa;
      border-bottom: 1px solid #eceff3;
      box-shadow: inset 0 0 0 1px #eceff3;
    }
    .cal-grid-head div {
      display: table-cell;
      width: 14.285714%;
      padding: 10px 8px;
      text-align: right;
      vertical-align: middle;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-sub);
      box-shadow: inset 1px 0 0 #eceff3;
    }
    .cal-grid-head div:first-child { box-shadow: none; }
    .cal-grid-head .sun { color: #dc2626; }
    .cal-grid-head .sat { color: #2563eb; }
    .cal-body { background: #fff; }
    .cal-week {
      position: relative;
      border-bottom: 1px solid #eceff3;
    }
    .cal-week:last-child { border-bottom: none; }
    .cal-week-grid {
      display: table;
      table-layout: fixed;
      width: 100%;
      box-shadow: inset 0 0 0 1px #eceff3;
    }
    .cal-day {
      display: table-cell;
      width: 14.285714%;
      vertical-align: top;
      min-height: 132px;
      padding: 8px 6px 8px;
      background: #fff;
      box-shadow: inset 1px 0 0 #eceff3;
    }
    .cal-day:first-child { box-shadow: none; }
    .cal-day.muted { background: #fafafa; }
    .cal-day.today { background: linear-gradient(180deg, #fff8fb 0%, #fff 100%); }
    .cal-day-head {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 6px;
    }
    .cal-day-num {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
    }
    .cal-day.today .cal-day-num {
      background: var(--pink);
      color: #fff;
    }
    .cal-day.muted .cal-day-num { color: #9ca3af; }
    .cal-day-content {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .cal-event {
      display: block;
      border-radius: 6px;
      padding: 3px 6px;
      font-size: 11px;
      font-weight: 700;
      line-height: 1.35;
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
      word-break: break-word;
      border-left: 3px solid transparent;
      background: #f8fafc;
      color: var(--text);
    }
    .cal-event.phase-stim { background: #eff6ff; border-left-color: #3b82f6; color: #1d4ed8; }
    .cal-event.phase-retrieval { background: #f5f3ff; border-left-color: #8b5cf6; color: #6d28d9; }
    .cal-event.phase-rest { background: #f3f4f6; border-left-color: #9ca3af; color: #4b5563; }
    .cal-event.phase-fet { background: #fdf2f8; border-left-color: #ec4899; color: #be185d; }
    .cal-event.phase-pregnancy { background: #fff1f6; border-left-color: #be185d; color: #9d174d; }
    .cal-event.est { opacity: .78; }
    .cal-event.is-medication {
      cursor: pointer;
      position: relative;
      padding-right: 22px;
    }
    .cal-event.is-medication::after {
      content: '?';
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 800;
      color: #fff;
      background: rgba(17, 24, 39, .3);
    }
    .cal-more {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-sub);
      padding: 2px 2px 0;
    }
    .cal-bars {
      position: absolute;
      left: 0;
      right: 0;
      top: 42px;
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      grid-auto-rows: 22px;
      pointer-events: none;
    }
    .cal-bar {
      position: relative;
      height: 20px;
      margin: 0 4px 2px;
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 700;
      line-height: 1.2;
      color: #fff;
      box-shadow: 0 1px 0 rgba(255,255,255,.45) inset;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .cal-bar.is-medication { cursor: pointer; pointer-events: auto; }
    .cal-bar.edge-start { margin-left: 0; }
    .cal-bar.edge-end   { margin-right: 0; }
    .cal-bar.continue-start {
      border-top-left-radius: 0;
      border-bottom-left-radius: 0;
    }
    .cal-bar.continue-end {
      border-top-right-radius: 0;
      border-bottom-right-radius: 0;
    }
    .cal-bar.stim-med { background: linear-gradient(90deg, #60a5fa, #3b82f6); }
    .cal-bar.estrogen-med { background: linear-gradient(90deg, #f472b6, #ec4899); }
    .cal-bar.prog-med { background: linear-gradient(90deg, #c084fc, #8b5cf6); }

    /* 笏笏 Timeline card 笏笏 */
    .tlc { border-radius: var(--radius); padding: 20px 18px; background: #fff; box-shadow: var(--shadow); margin-bottom: 12px; }
    .tlc-hd { font-size: 10px; font-weight: 700; letter-spacing: .12em; color: var(--text-sub); margin-bottom: 14px; }

    /* 笏笏 Timeline 笏笏 */
    .tl { position: relative; padding-left: 30px; }
    .tl::before {
      content: ''; position: absolute; left: 9px; top: 10px; bottom: 14px;
      width: 2px;
      background: linear-gradient(to bottom, #ec4899 0%, #c4b5fd 60%, #e9d5ff 100%);
    }

    /* Phase group */
    .tl-phase { margin-bottom: 4px; }
    .tl-phase-hd {
      position: relative; margin-bottom: 8px;
      display: flex; align-items: center; gap: 6px;
    }
    .tl-phase-hd::before {
      content: ''; position: absolute; left: -26px; top: 50%;
      transform: translateY(-50%);
      width: 8px; height: 8px; border-radius: 50%;
      background: currentColor; opacity: .3;
    }
    .tl-ph-label { font-size: 10px; font-weight: 700; letter-spacing: .08em; padding: 2px 10px; border-radius: 99px; }

    /* Event item */
    .tl-item { position: relative; margin-bottom: 14px; display: flex; gap: 0; }
    .tl-item:last-child { margin-bottom: 0; }

    .tl-dot {
      position: absolute; left: -25px; top: 6px;
      width: 12px; height: 12px; border-radius: 50%;
      border: 2px solid #fff; flex-shrink: 0;
      transition: box-shadow .3s;
    }
    .tl-dot.past    { background: #d1d5db; box-shadow: 0 0 0 2px #d1d5db; }
    .tl-dot.active  { background: var(--pink); box-shadow: 0 0 0 5px rgba(236,72,153,.2); animation: tl-pulse 1.8s infinite; }
    .tl-dot.key     { background: var(--pink-dark); box-shadow: 0 0 0 2px var(--pink-dark); }
    .tl-dot.normal  { background: #c4b5fd; box-shadow: 0 0 0 2px #c4b5fd; }
    .tl-dot.est     { background: #fbbf24; box-shadow: 0 0 0 2px #fbbf24; }

    @keyframes tl-pulse {
      0%,100% { box-shadow: 0 0 0 5px rgba(236,72,153,.2); }
      50%     { box-shadow: 0 0 0 9px rgba(236,72,153,.05); }
    }

    .tl-body { flex: 1; }
    .tl-row1 { display: flex; align-items: flex-start; gap: 6px; flex-wrap: wrap; }
    .tl-name { font-size: 13px; font-weight: 700; color: var(--text); }
    .tl-name.past { color: #9ca3af; }
    .tl-sub { font-size: 11px; color: var(--text-sub); margin-top: 2px; line-height: 1.4; }
    .tl-sub.past { color: #d1d5db; }
    .tl-date { font-size: 11px; font-weight: 600; color: var(--pink); margin-top: 2px; }
    .tl-date.past { color: #d1d5db; }
    .tl-date.est  { color: #d97706; }
    .med-trigger {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 8px;
      border: 0;
      background: #fff1f6;
      color: var(--pink-dark);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
      transition: background .18s, transform .18s;
    }
    .med-trigger:hover {
      background: #fce7f3;
      transform: translateY(-1px);
    }

    /* Badges */
    .badge {
      display: inline-flex; align-items: center;
      font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 99px;
      flex-shrink: 0;
    }
    .b-done  { background: #f3f4f6; color: #9ca3af; }
    .b-today { background: var(--pink-light); color: var(--pink-dark); }
    .b-soon  { background: var(--purple-light); color: var(--purple); }
    .b-est   { background: #fef3c7; color: #d97706; }

    /* "莉翫％縺・ marker */
    .tl-now-marker {
      position: relative; margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .tl-now-marker::before {
      content: '';
      position: absolute; left: -26px; top: 50%; transform: translateY(-50%);
      width: 14px; height: 14px; border-radius: 50%;
      background: #fff; border: 3px solid var(--pink);
      box-shadow: 0 0 0 4px rgba(236,72,153,.15);
    }
    .tl-now-tag {
      font-size: 12px; font-weight: 800; color: var(--pink-dark);
      background: var(--pink-light); padding: 4px 14px; border-radius: 99px;
    }

    /* 笏笏 Export 笏笏 */
    .exp { display: flex; gap: 10px; margin-bottom: 12px; }
    .exp-btn {
      flex: 1; padding: 12px 8px; border: 2px solid var(--pink-mid);
      border-radius: 12px; background: #fff; color: var(--pink-dark);
      font-size: 13px; font-weight: 700; cursor: pointer; transition: all .18s;
      text-align: center; line-height: 1.3;
    }
    .exp-btn:hover { background: var(--pink-light); border-color: var(--pink); }

    /* 笏笏 Toast 笏笏 */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: #1f2937; color: #fff; padding: 10px 20px; border-radius: 99px;
      font-size: 13px; font-weight: 600; pointer-events: none;
      transition: transform .3s, opacity .3s; opacity: 0; z-index: 999;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 1200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(15, 23, 42, .42);
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s ease;
    }
    .modal.show {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-panel {
      width: min(100%, 560px);
      max-height: min(88vh, 820px);
      overflow: auto;
      border-radius: 24px;
      background: linear-gradient(180deg, #fff 0%, #fff8fb 100%);
      box-shadow: 0 24px 70px rgba(15, 23, 42, .22);
      padding: 22px 20px 18px;
    }
    .modal-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }
    .modal-eyebrow {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .12em;
      color: var(--text-sub);
      margin-bottom: 6px;
    }
    .modal-title {
      font-size: 22px;
      line-height: 1.2;
      color: var(--pink-dark);
      font-weight: 800;
    }
    .modal-subtitle {
      margin-top: 6px;
      font-size: 13px;
      color: var(--text-sub);
    }
    .modal-close {
      width: 40px;
      height: 40px;
      border: 0;
      border-radius: 50%;
      background: #fdf2f8;
      color: var(--pink-dark);
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
    }
    .modal-note {
      font-size: 12px;
      color: var(--text-sub);
      background: #fff;
      border: 1px solid #f3e8f0;
      border-radius: 14px;
      padding: 12px 14px;
      margin-bottom: 14px;
    }
    .med-section {
      background: #fff;
      border: 1px solid #f3e8f0;
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 10px;
    }
    .med-section h3 {
      font-size: 13px;
      color: var(--pink-dark);
      margin-bottom: 8px;
    }
    .med-section ul {
      padding-left: 18px;
      color: var(--text);
    }
    .med-section li {
      font-size: 13px;
      margin-bottom: 6px;
    }
    .med-section li:last-child { margin-bottom: 0; }

const normalizeMedicationName = name => (name || '').replace(/\s+/g, '').replace(/[・茨ｼ・)]/g, '').trim();

function resolveMedicationInfo(medicationId, selectedName = '') {
  const base = MEDICATION_INFO[medicationId];
  const db = MEDICATION_NAME_DATABASE[medicationId] || {};
  const normalized = normalizeMedicationName(selectedName);
  const matchedKey = Object.keys(db).find(key => {
    const keyNorm = normalizeMedicationName(key);
    return normalized === keyNorm || normalized.includes(keyNorm) || keyNorm.includes(normalized);
  });
  const specific = matchedKey ? db[matchedKey] : null;
  const displayName = selectedName || base.title;

  return {
    ...base,
    ...(specific || {}),
    title: displayName,
    actualName: selectedName || '',
    canonicalName: matchedKey || '',
    isSpecific: !!specific
  };
}

function syncActiveDateEditor() {
  const fieldId = getActiveDateFieldId();
  const meta = DATE_FIELD_META[fieldId];
  const hiddenInput = document.getElementById(fieldId);
  const activeInput = document.getElementById('activeDateValue');
  const hint = document.getElementById('activeDateHint');
  if (!hiddenInput || !activeInput || !hint || !meta) return;

  activeInput.value = hiddenInput.value || todayISO();
  activeInput.classList.toggle('filled', !!activeInput.value);
  hint.textContent = meta.hint;
}

function setExclusiveDateValue(fieldId, value) {
  ['stimDate', 'opuDate', 'fetStartDate', 'etDate'].forEach(id => {
    const input = document.getElementById(id);
    if (!input) return;
    input.value = id === fieldId ? value : '';
    input.classList.toggle('filled', !!input.value);
  });
}

function applyActiveDateValue() {
  const activeInput = document.getElementById('activeDateValue');
  if (!activeInput) return;

  const value = activeInput.value || todayISO();
  activeInput.value = value;
  activeInput.classList.toggle('filled', !!value);
}

function applySelectedDateField() {
  syncActiveDateEditor();
}

function buildScheduleFromActiveInput() {
  const fieldId = getActiveDateFieldId();
  const activeInput = document.getElementById('activeDateValue');
  const hiddenInput = document.getElementById(fieldId);
  if (!activeInput || !hiddenInput) return;

  const value = activeInput.value || todayISO();
  activeInput.value = value;
  activeInput.classList.toggle('filled', !!value);
  setExclusiveDateValue(fieldId, value);
  onInput({ target: hiddenInput });
}

window.addEventListener('DOMContentLoaded', () => {
  const fromURL = restoreFromURL();
  if (!fromURL) restoreFromStorage();
  const hasSavedDate = ['stimDate','opuDate','fetStartDate','etDate'].some(id => document.getElementById(id).value);
  if (!hasSavedDate) {
    document.getElementById('stimDate').value = todayISO();
  }
  setupMedicationModal();
  createSingleDateInputUI();
  hideLegacyDateFields();

  // 蜈･蜉帙ワ繧､繝ｩ繧､繝・
  ['stimDate','opuDate','fetStartDate','etDate'].forEach(id => {
    const el = document.getElementById(id);
    el.classList.toggle('filled', !!el.value);
  });

  const activeDateField = document.getElementById('activeDateField');
  const activeDateValue = document.getElementById('activeDateValue');
  const buildScheduleButton = document.getElementById('buildScheduleButton');
  activeDateField.value = getInitialDateFieldId();
  activeDateField.addEventListener('change', applySelectedDateField);
  activeDateValue.addEventListener('change', applyActiveDateValue);
  buildScheduleButton.addEventListener('click', buildScheduleFromActiveInput);
  syncActiveDateEditor();

  initialized = true;
  const hasAny = ['stimDate','opuDate','fetStartDate','etDate'].some(id => document.getElementById(id).value);
  if (hasAny) runCalc();
});

function onInput(e) {
  userInteracted = true;
  e.target.classList.toggle('filled', !!e.target.value);
  saveToURL();
  saveToStorage();
  runCalc();
  syncActiveDateEditor();
}

function setEmbryo(n) {
  userInteracted = true;
  embryoDay = n;
  document.getElementById('btn5').classList.toggle('active', n === 5);
  document.getElementById('btn3').classList.toggle('active', n === 3);
  if (!initialized) return;
  saveToURL(); saveToStorage(); runCalc();
}

// 笏笏 URL 菫晏ｭ・/ 蠕ｩ蜈・笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏
function saveToURL() {
  const p = new URLSearchParams();
  const s = document.getElementById('stimDate').value;
  const o = document.getElementById('opuDate').value;
  const f = document.getElementById('fetStartDate').value;
  const e = document.getElementById('etDate').value;
  if (s) p.set('start', s);
  if (o) p.set('opu',   o);
  if (f) p.set('fet',   f);
  if (e) p.set('et',    e);
  p.set('d', embryoDay);
  history.replaceState(null, '', '?' + p.toString());
}

function restoreFromURL() {
  const p = new URLSearchParams(location.search);
  let found = false;
  if (p.has('start')) { document.getElementById('stimDate').value = p.get('start'); found = true; }
  if (p.has('opu'))   { document.getElementById('opuDate').value  = p.get('opu');   found = true; }
  if (p.has('fet'))   { document.getElementById('fetStartDate').value = p.get('fet'); found = true; }
  if (p.has('et'))    { document.getElementById('etDate').value   = p.get('et');    found = true; }
  if (p.has('d'))     embryoDay = parseInt(p.get('d')) || 5;
  document.getElementById('btn5').classList.toggle('active', embryoDay === 5);
  document.getElementById('btn3').classList.toggle('active', embryoDay === 3);
  return found;
}

// 笏笏 localStorage 笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏
function saveToStorage() {
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify({
      start: document.getElementById('stimDate').value,
      opu:   document.getElementById('opuDate').value,
      fet:   document.getElementById('fetStartDate').value,
      et:    document.getElementById('etDate').value,
      d:     embryoDay
    }));
  } catch (_) {}
}

function restoreFromStorage() {
  try {
    const data = JSON.parse(localStorage.getItem(STORE_KEY) || 'null');
    if (!data) return;
    if (data.start) document.getElementById('stimDate').value = data.start;
    if (data.opu)   document.getElementById('opuDate').value  = data.opu;
    if (data.fet)   document.getElementById('fetStartDate').value = data.fet;
    if (data.et)    document.getElementById('etDate').value   = data.et;
    if (data.d)     { embryoDay = data.d; }
    document.getElementById('btn5').classList.toggle('active', embryoDay === 5);
    document.getElementById('btn3').classList.toggle('active', embryoDay === 3);
  } catch (_) {}
}

  const etD  = floor0(et);

function renderCalendar(events, medicationBars, today) {
  const month = currentCalendarMonth || startOfMonth(today);
  document.getElementById('calendarTitle').textContent = fmtMonth(month);

  const body = document.getElementById('calendar');
  body.innerHTML = '';
  const hiddenEventIds = new Set(['estrogen', 'prog']);
  const barLabelRemainders = new Map();

  const monthStart = startOfMonth(month);
  const monthEnd = endOfMonth(month);
  const gridStart = startOfWeek(monthStart);
  const gridEnd = endOfWeek(monthEnd);

  for (let weekStart = new Date(gridStart); weekStart <= gridEnd; weekStart = addDays(weekStart, 7)) {
    const weekEnd = addDays(weekStart, 6);
    const weekEl = document.createElement('div');
    weekEl.className = 'cal-week';

    const weekGrid = document.createElement('div');
    weekGrid.className = 'cal-week-grid';

    const dayCells = [];
    for (let i = 0; i < 7; i++) {
      const day = addDays(weekStart, i);
      const dayEvents = events.filter(ev =>
        floor0(ev.date).getTime() === floor0(day).getTime() && !hiddenEventIds.has(ev.id)
      );
      const cell = document.createElement('div');
      const muted = day.getMonth() !== month.getMonth();
      const isToday = floor0(day).getTime() === today.getTime();
      cell.className = `cal-day${muted ? ' muted' : ''}${isToday ? ' today' : ''}`;

      const cellHead = document.createElement('div');
      cellHead.className = 'cal-day-head';
      cellHead.innerHTML = `<span class="cal-day-num">${day.getDate()}</span>`;
      cell.appendChild(cellHead);

      const cellContent = document.createElement('div');
      cellContent.className = 'cal-day-content';

      dayEvents.slice(0, 3).forEach(ev => {
        const item = document.createElement('div');
        item.className = `cal-event phase-${ev.phase}${ev.est ? ' est' : ''}${ev.medicationId ? ' is-medication' : ''}`;
        item.textContent = ev.name;
        if (ev.medicationId) {
          item.tabIndex = 0;
          item.setAttribute('role', 'button');
          item.setAttribute('aria-label', `${ev.name} 縺ｮ阮ｬ縺ｮ隱ｬ譏弱ｒ髢九￥`);
          item.addEventListener('click', () => openMedicationModal(ev.medicationId, ev.name, item));
          item.addEventListener('keydown', e => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              openMedicationModal(ev.medicationId, ev.name, item);
            }
          });
        }
        item.title = `${ev.name}繝ｻ${fmtFull(ev.date)}${ev.est ? '・育岼螳会ｼ・ : ''}${ev.medicationId ? '繝ｻ阮ｬ縺ｮ隱ｬ譏弱≠繧・ : ''}`;
        cellContent.appendChild(item);
      });
      if (dayEvents.length > 3) {
        const more = document.createElement('div');
        more.className = 'cal-more';
        more.textContent = `+${dayEvents.length - 3}莉ｶ`;
        cellContent.appendChild(more);
      }

      cell.appendChild(cellContent);
      dayCells.push(cellContent);
      weekGrid.appendChild(cell);
    }

    const weekBars = medicationBars
      .filter(bar => floor0(bar.end) >= floor0(weekStart) && floor0(bar.start) <= floor0(weekEnd))
      .map(bar => ({
        ...bar,
        renderStart: floor0(bar.start) < floor0(weekStart) ? floor0(weekStart) : floor0(bar.start),
        renderEnd: floor0(bar.end) > floor0(weekEnd) ? floor0(weekEnd) : floor0(bar.end),
      }))
      .sort((a, b) => a.renderStart - b.renderStart || a.renderEnd - b.renderEnd);

    const barRows = [];
    weekBars.forEach(bar => {
      const startCol = diffDays(bar.renderStart, weekStart);
      const endCol = diffDays(bar.renderEnd, weekStart);
      let rowIndex = 0;
      while (barRows[rowIndex] !== undefined && barRows[rowIndex] >= startCol) rowIndex++;
      barRows[rowIndex] = endCol;
      bar.rowIndex = rowIndex;
      bar.startCol = startCol;
      bar.endCol = endCol;
    });

    const topPad = (barRows.length * 22) + 4;
    dayCells.forEach(el => { el.style.paddingTop = `${topPad}px`; });

    const barsLayer = document.createElement('div');
    barsLayer.className = 'cal-bars';

    weekBars.forEach(bar => {
      const barEl = document.createElement('div');
      barEl.className = `cal-bar ${bar.colorClass}${bar.medicationId ? ' is-medication' : ''}`;
      if (bar.startCol === 0) barEl.classList.add('edge-start');
      if (bar.endCol === 6) barEl.classList.add('edge-end');
      if (floor0(bar.start) < floor0(weekStart)) barEl.classList.add('continue-start');
      if (floor0(bar.end) > floor0(weekEnd)) barEl.classList.add('continue-end');

      const segmentCols = bar.endCol - bar.startCol + 1;
      const approxCapacity = Math.max(1, segmentCols * 5);
      const startsThisWeek = floor0(bar.start) >= floor0(weekStart);

      let labelText = '';
      if (startsThisWeek) {
        labelText = bar.title.slice(0, approxCapacity);
        const remainder = bar.title.slice(approxCapacity);
        if (remainder) barLabelRemainders.set(bar.id, remainder);
      } else if (barLabelRemainders.has(bar.id)) {
        const remainder = barLabelRemainders.get(bar.id);
        labelText = remainder.slice(0, approxCapacity);
        const nextRemainder = remainder.slice(approxCapacity);
        if (nextRemainder) barLabelRemainders.set(bar.id, nextRemainder);
        else barLabelRemainders.delete(bar.id);
      }

      barEl.textContent = labelText;
      barEl.title = `${bar.title}・・{fmtFull(bar.start)}縲・{fmtFull(bar.end)}`;
      barEl.style.gridColumn = `${bar.startCol + 1} / ${bar.endCol + 2}`;
      barEl.style.gridRow = `${bar.rowIndex + 1}`;
      if (bar.medicationId) {
        barEl.tabIndex = 0;
        barEl.setAttribute('role', 'button');
        barEl.setAttribute('aria-label', `${bar.title} 縺ｮ阮ｬ縺ｮ隱ｬ譏弱ｒ髢九￥`);
        barEl.addEventListener('click', () => openMedicationModal(bar.medicationId, bar.title, barEl));
        barEl.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            openMedicationModal(bar.medicationId, bar.title, barEl);
          }
        });
      }
      barsLayer.appendChild(barEl);
    });

    weekEl.appendChild(weekGrid);
    weekEl.appendChild(barsLayer);
    body.appendChild(weekEl);
  }
}

function moveCalendar(offset) {
  if (!computed) return;
  const base = currentCalendarMonth || startOfMonth(computed.today);
  currentCalendarMonth = new Date(base.getFullYear(), base.getMonth() + offset, 1);
  renderCalendar(computed.events, computed.medicationBars, computed.today);
}

function jumpCalendarToday() {
  if (!computed) return;
  const monthBase = computed.events.find(ev => floor0(ev.date) >= computed.today)?.date || computed.today;
  currentCalendarMonth = startOfMonth(monthBase);
  renderCalendar(computed.events, computed.medicationBars, computed.today);
}

function renderTimeline(events, today) {
  const tl = document.getElementById('timeline');
  tl.innerHTML = '';

  let lastPhase      = null;
  let nowMarkerAdded = false;

  events.forEach(ev => {
    const evDay   = floor0(ev.date);
    const isPast  = evDay < today;
    const isToday = evDay.getTime() === today.getTime();

    // 縲御ｻ翫％縺薙阪・繝ｼ繧ｫ繝ｼ謖ｿ蜈･・磯℃蜴ｻ竊呈悴譚･縺ｮ蠅・阜・・
    if (!isPast && !nowMarkerAdded) {
      nowMarkerAdded = true;
      const marker = document.createElement('div');
      marker.className = 'tl-now-marker';
      marker.innerHTML = '<span class="tl-now-tag">笆ｶ 莉翫％縺・/span>';
      tl.appendChild(marker);
    }

    // 繝輔ぉ繝ｼ繧ｺ蛹ｺ蛻・ｊ
    if (ev.phase !== lastPhase) {
      lastPhase = ev.phase;
      const ph  = PHASES[ev.phase];
      const phEl = document.createElement('div');
      phEl.className = 'tl-phase-hd';
      phEl.style.color = ph.color;
      phEl.innerHTML = `<span class="tl-ph-label" style="background:${ph.bg};color:${ph.color}">${ph.label}</span>`;
      tl.appendChild(phEl);
    }

    // 繝峨ャ繝医け繝ｩ繧ｹ
    let dotCls = 'tl-dot ';
    if (isPast)       dotCls += 'past';
    else if (isToday) dotCls += 'active';
    else if (ev.key)  dotCls += 'key';
    else if (ev.est)  dotCls += 'est';
    else              dotCls += 'normal';

    // 繝舌ャ繧ｸ
    let badge = '';
    if (isPast)       badge = '<span class="badge b-done">笨・螳御ｺ・/span>';
    else if (isToday) badge = '<span class="badge b-today">莉頑律・・/span>';
    else if (ev.est)  badge = '<span class="badge b-est">謗ｨ螳・/span>';
    else              badge = '<span class="badge b-soon">莠亥ｮ・/span>';

    const item = document.createElement('div');
    item.className = 'tl-item';
    item.innerHTML = `
      <div class="${dotCls}"></div>
      <div class="tl-body">
        <div class="tl-row1">
          <span class="tl-name${isPast?' past':''}">${ICONS[ev.id]||'東'} ${ev.name}</span>${badge}
        </div>
        <div class="tl-sub${isPast?' past':''}">${ev.sub}</div>
        <div class="tl-date${isPast?' past':(ev.est?' est':'')}">${fmtShort(ev.date)}${ev.est?' ・域耳螳夲ｼ・:''}</div>
      </div>`;
    if (ev.medicationId) {
      const bodyEl = item.querySelector('.tl-body');
      const medBtn = document.createElement('button');
      medBtn.type = 'button';
      medBtn.className = 'med-trigger';
      medBtn.textContent = '阮ｬ縺ｮ隱ｬ譏弱ｒ隕九ｋ';
      medBtn.addEventListener('click', () => openMedicationModal(ev.medicationId, ev.name, medBtn));
      bodyEl.appendChild(medBtn);
    }
    tl.appendChild(item);
  });
}

function setupMedicationModal() {
  const modal = document.getElementById('medicationModal');
  const close = document.getElementById('medicationClose');
  if (!modal || !close) return;

  close.addEventListener('click', closeMedicationModal);
  modal.addEventListener('click', e => {
    if (e.target === modal) closeMedicationModal();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && modal.classList.contains('show')) closeMedicationModal();
  });
}

function openMedicationModal(medicationId, scheduleLabel, triggerEl) {
  const info = resolveMedicationInfo(medicationId);
  const modal = document.getElementById('medicationModal');
  if (!info || !modal) return;

  lastModalTrigger = triggerEl || null;
  document.getElementById('medicationTitle').textContent = info.title;
  document.getElementById('medicationSubtitle').textContent = scheduleLabel ? `${scheduleLabel} 縺ｫ髢｢縺吶ｋ隱ｬ譏餐 : info.subtitle;
  document.getElementById('medicationNote').textContent = `${info.subtitle}縲・{info.note}`;
  document.getElementById('medicationBody').innerHTML = buildMedicationSections(info);
  modal.classList.add('show');
  modal.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
  document.getElementById('medicationClose').focus();
}

function closeMedicationModal() {
  const modal = document.getElementById('medicationModal');
  if (!modal) return;
  modal.classList.remove('show');
  modal.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
  if (lastModalTrigger && typeof lastModalTrigger.focus === 'function') lastModalTrigger.focus();
}

function buildMedicationSections(info) {
  const sections = [
    ['菴輔・縺溘ａ縺ｫ菴ｿ縺・・縺・, info.purpose],
    ['菴ｿ縺｣縺ｦ縺・ｋ譛滄俣縺ｮ豕ｨ諢・, info.caution],
    ['菴ｿ縺・→襍ｷ縺薙ｊ繧・☆縺・％縺ｨ', info.effects],
    ['縺薙ｓ縺ｪ譎ゅ・逞・劼縺ｸ逶ｸ隲・, info.contact],
  ];

  const sectionHtml = sections.map(([title, items]) => `
    <section class="med-section">
      <h3>${title}</h3>
      <ul>${items.map(item => `<li>${item}</li>`).join('')}</ul>
    </section>
  `).join('');

  const tags = (info.examples || []).map(name => `<a class="med-tag" href="${getMedicationArticleAnchor(name)}">${name}</a>`).join('');
  const examplesHtml = tags ? `
    <section class="med-section">
      <h3>繧医￥縺ゅｋ阮ｬ蜷阪・萓・/h3>
      <div class="med-tags">${tags}</div>
    </section>
  ` : '';

  return sectionHtml + examplesHtml;
}

function downloadICS() {
  if (!computed) return;
  const lines = [
    'BEGIN:VCALENDAR','VERSION:2.0',
    'PRODID:-//IVF Scheduler//JA','CALSCALE:GREGORIAN','METHOD:PUBLISH',
  ];
  computed.events.forEach(ev => {
    lines.push(
      'BEGIN:VEVENT',
      `DTSTART;VALUE=DATE:${icsDate(ev.date)}`,
      `DTEND;VALUE=DATE:${icsDate(addDays(ev.date,1))}`,
      `SUMMARY:${ev.name}`,
      `DESCRIPTION:${ev.sub}${ev.est?' 窶ｻ謗ｨ螳壽律':''}`,
      'END:VEVENT'
    );
  });
  lines.push('END:VCALENDAR');
  const blob = new Blob([lines.join('\r\n')], { type:'text/calendar;charset=utf-8' });
  const a    = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download:'ivf-schedule.ics' });
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('繧ｫ繝ｬ繝ｳ繝繝ｼ縺ｫ霑ｽ蜉縺励∪縺励◆');
}

// 笏笏 URL繧ｳ繝斐・ 笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏
async function copyURL() {
  try {
    await navigator.clipboard.writeText(location.href);
    showToast('URL繧偵さ繝斐・縺励∪縺励◆・・);
  } catch (_) {
    prompt('縺薙・URL繧偵さ繝斐・縺励※縺上□縺輔＞:', location.href);
  }
}

// 笏笏 Toast 笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}
</script>
